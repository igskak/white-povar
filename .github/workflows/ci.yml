name: Continuous Integration

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.1'
  PYTHON_VERSION: '3.11'
  CI_SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlc3QiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTcwMDAwMDAwMCwiZXhwIjo0MTAyNDQ0ODAwfQ.test-signature'
  CI_SUPABASE_SERVICE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlc3QiLCJyb2xlIjoic2VydmljZV9yb2xlIiwiaWF0IjoxNzAwMDAwMDAwLCJleHAiOjQxMDI0NDQ4MDB9.test-signature'

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend
        
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        cache: true
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Verify formatting
      run: dart format --output=none --set-exit-if-changed .
      
    - name: Analyze code
      run: flutter analyze
      
    - name: Run tests
      run: flutter test

    - name: Build Flutter web
      run: |
        flutter build web \
          --release \
          --base-href=/ \
          --dart-define=API_BASE_URL=https://white-povar-api-p79r.onrender.com \
          --dart-define=WEB_APP_URL=https://white-povar-p79r.onrender.com \
          --dart-define=SUPABASE_URL=https://example.supabase.co \
          --dart-define=SUPABASE_ANON_KEY=test-anon-key \
          --dart-define=ENVIRONMENT=ci

  backend-ci:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend
        
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        cache-dependency-path: 'backend/requirements*.txt'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
        
    - name: Lint code
      run: flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
      
    - name: Run tests
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://example.supabase.co' }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY || env.CI_SUPABASE_ANON_KEY }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || env.CI_SUPABASE_SERVICE_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'test-openai-key' }}
        SECRET_KEY: ${{ secrets.SECRET_KEY || 'test-secret-key-for-ci' }}
        FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID || 'test-firebase-project' }}
      run: pytest tests/ -v
        
    - name: Test API startup
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://example.supabase.co' }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY || env.CI_SUPABASE_ANON_KEY }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || env.CI_SUPABASE_SERVICE_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'test-openai-key' }}
        SECRET_KEY: ${{ secrets.SECRET_KEY || 'test-secret-key-for-ci' }}
        FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID || 'test-firebase-project' }}
      run: |
        python -c "
        import sys
        sys.path.append('.')
        try:
            from app.main import app
            print('✅ FastAPI app imports successfully')
        except Exception as e:
            print(f'❌ FastAPI app import failed: {e}')
            exit(1)
        "
